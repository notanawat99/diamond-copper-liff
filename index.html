<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0F172A">
    <title>Diamond Copper - บันทึกการชั่ง</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap');
        :root{--buy:#1565C0;--sell:#2E7D32;--dark:#0F172A;--card:#FFFFFF;--bg:#F1F5F9;--text:#1E293B;--muted:#94A3B8;--border:#E2E8F0;--green:#22C55E;--red:#EF4444;--orange:#F97316;--shadow:0 1px 12px rgba(0,0,0,0.08);--r:16px;--accent:#1565C0;}
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:48px;}
        .hdr{background:var(--dark);padding:18px 18px 20px;position:sticky;top:0;z-index:100;}
        .hdr-top{display:flex;justify-content:space-between;align-items:flex-start;}
        .hdr-brand{font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:2px;text-transform:uppercase;}
        .hdr-title{font-size:20px;font-weight:800;color:#fff;margin-top:2px;}
        .hdr-step{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px;}
        .hdr-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);}
        .hdr-badge.buy{background:rgba(21,101,192,0.4);color:#90CAF9;}
        .hdr-badge.sell{background:rgba(46,125,50,0.4);color:#A5D6A7;}
        .progress-bar{display:flex;gap:4px;margin-top:14px;}
        .pb-seg{height:3px;border-radius:2px;background:rgba(255,255,255,0.15);flex:1;transition:background .3s;}
        .pb-seg.done{background:rgba(255,255,255,0.5);}
        .pb-seg.active{background:#fff;}
        .content{padding:16px;}
        .section{display:none;animation:up .25s ease;}
        .section.active{display:block;}
        @keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
        .card{background:var(--card);border-radius:var(--r);padding:18px;margin-bottom:14px;box-shadow:var(--shadow);}
        .card-title{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;}
        .type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
        .type-btn{border:2px solid var(--border);border-radius:14px;padding:18px 10px;text-align:center;cursor:pointer;transition:all .2s;background:#fff;}
        .type-btn .ti{font-size:30px;margin-bottom:6px;}
        .type-btn .tl{font-size:14px;font-weight:700;}
        .type-btn.buy.sel{border-color:var(--buy);background:#EFF6FF;}
        .type-btn.sell.sel{border-color:var(--sell);background:#F0FDF4;}
        .doc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
        .doc-btn{border:2px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;background:#fff;}
        .doc-btn.sel.buy{border-color:var(--buy);background:#EFF6FF;}
        .doc-btn.sel.sell{border-color:var(--sell);background:#F0FDF4;}
        .igroup{margin-bottom:14px;}
        .ilabel{font-size:13px;font-weight:700;color:var(--text);margin-bottom:7px;display:block;}
        .ifield{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:13px 15px;font-size:16px;font-family:'Sarabun',sans-serif;outline:none;}
        .ifield:focus{border-color:var(--accent);}
        .photo-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
        .photo-box{border:2px dashed var(--border);border-radius:14px;padding:14px 10px;text-align:center;background:#FAFAFA;min-height:100px;display:flex;flex-direction:column;justify-content:center;align-items:center;}
        .photo-box.has-photo{border-style:solid;border-color:var(--green);background:#F0FDF4;}
        .photo-preview{width:100%;border-radius:8px;margin-top:8px;display:none;height:80px;object-fit:cover;}
        .photo-upload-btn{display:block;width:100%;padding:9px 4px;border:1.5px solid var(--border);border-radius:10px;background:#fff;font-size:11px;font-weight:700;cursor:pointer;}
        .photo-upload-btn.cam{border-color:var(--buy);color:var(--buy);background:#EFF6FF;}
        .ptype-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
        .ptype-btn{border:2px solid var(--border);border-radius:12px;padding:12px 10px;text-align:center;cursor:pointer;font-size:14px;font-weight:700;}
        .ptype-btn.sel{border-color:var(--orange);background:#FFF7ED;color:var(--orange);}
        .wcard{background:var(--dark);border-radius:14px;padding:16px 18px;margin:12px 0;}
        .wrow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.07);}
        .wval{font-size:15px;font-weight:700;color:#fff;}
        .wval.net{font-size:22px;color:#4ADE80;}
        .btn{width:100%;padding:16px;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;}
        .btn-primary{background:var(--buy);color:#fff;}
        .btn-primary:disabled{background:#CBD5E1;color:#94A3B8;}
        .btn-secondary{background:#fff;border:2px solid #94A3B8;}
        .counter-bar{background:var(--dark);border-radius:14px;padding:12px 16px;display:flex;justify-content:space-between;margin-bottom:14px;color:#fff;}
        .loading{display:none;align-items:center;gap:10px;background:#EFF6FF;padding:12px;border-radius:12px;margin-top:10px;}
        .spinner{width:18px;height:18px;border:3px solid #BFDBFE;border-top-color:var(--buy);border-radius:50%;animation:spin .7s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
    </style>
</head>
<body>

<div class="hdr">
    <div class="hdr-top">
        <div>
            <div class="hdr-brand">Diamond Copper Trade</div>
            <div class="hdr-title" id="hTitle">บันทึกการชั่งสินค้า</div>
            <div class="hdr-step" id="hStep">ขั้นตอนที่ 1 จาก 5</div>
        </div>
        <div class="hdr-badge" id="hBadge">-</div>
    </div>
    <div class="progress-bar">
        <div class="pb-seg active" id="pb1"></div>
        <div class="pb-seg" id="pb2"></div>
        <div class="pb-seg" id="pb3"></div>
        <div class="pb-seg" id="pb4"></div>
        <div class="pb-seg" id="pb5"></div>
    </div>
</div>

                <div class="type-btn buy" onclick="selType('buy',this)">
                    <div class="ti">📥</div><div class="tl">ซื้อ / นำเข้า</div>
                </div>
                <div class="type-btn sell" onclick="selType('sell',this)">
                    <div class="ti">📤</div><div class="tl">ขาย / นำออก</div>
                </div>
            </div>
        </div>
        <div class="card" id="docCard" style="display:none">
            <div class="card-title">ประเภทเอกสาร</div>
            <div class="doc-grid" id="docGrid"></div>
        </div>
        <button class="btn btn-primary" id="s1Btn" onclick="go(2)" style="display:none">ถัดไป →</button>
    </div>

    <div class="section" id="s2">
        <div class="card">
            <div class="card-title" id="partnerTitle">นามผู้ขาย</div>
            <input class="ifield" id="partnerName" type="text" placeholder="ชื่อ / บริษัท" oninput="chk2()">
        </div>
        <div class="card">
            <div class="card-title">ข้อมูลรถ</div>
            <div class="photo-row">
                <div class="photo-col">
                    <div class="photo-box" id="vBox1">📸 ทะเบียนรถ <img class="photo-preview" id="vPrev1"></div>
                    <button class="photo-upload-btn cam" onclick="document.getElementById('vP1').click()">📷 ถ่ายรูป</button>
                    <input type="file" id="vP1" accept="image/*" onchange="previewOnly(this,'vPrev1','vBox1')" style="display:none">

                    <input type="file" id="vP2" accept="image/*" onchange="previewOnly(this,'vPrev2','vBox2')" style="display:none">
                </div>
            </div>
            <label class="ilabel">ระบุทะเบียนรถ</label>
            <input class="ifield" id="vPlate" type="text" placeholder="กข 1234 ชลบุรี" oninput="chk2()">
        </div>
        <div class="btn-row" style="display:flex;gap:10px;">
            <button class="btn btn-secondary" onclick="go(1)">กลับ</button>
            <button class="btn btn-primary" id="s2Btn" onclick="go(3)" disabled>ถัดไป →</button>
        </div>
    </div>

    <div class="section" id="s3">
        <div class="card">
            <div class="card-title">เลือกประเภทสินค้า</div>
            <div class="ptype-grid" id="ptypeGrid"></div>
            <div id="ptypeCustom" style="display:none; margin-top:10px;">
                <input class="ifield" id="customType" type="text" placeholder="ระบุประเภทสินค้าอื่นๆ..." oninput="chk3()">
            </div>
        </div>
        <div style="display:flex;gap:10px;">
            <button class="btn btn-secondary" onclick="go(2)">กลับ</button>
            <button class="btn btn-primary" id="s3Btn" onclick="go(4)" disabled>เริ่มชั่ง →</button>
        </div>
    </div>

    <div class="section" id="s4">
        <div class="counter-bar">
            <div>ชั่งแล้ว: <span id="bagCount">0</span> เต๊า</div>
            <div id="currentTypeDisplay">-</div>
        </div>
        <div class="card">
            <div class="photo-row">
                <div class="photo-col">
                    <div class="photo-box" id="sBox1">⚖️ ตาชั่ง <img class="photo-preview" id="sPrev1"></div>
                    <button class="photo-upload-btn cam" onclick="document.getElementById('sP1').click()">📷 ถ่ายรูป</button>
                    <input type="file" id="sP1" accept="image/*" onchange="previewOnly(this,'sPrev1','sBox1')" style="display:none">
                </div>
                <div class="photo-col">
                    <div class="photo-box" id="sBox2">🔶 สินค้า <img class="photo-preview" id="sPrev2"></div>
                    <button class="photo-upload-btn" onclick="document.getElementById('sP2').click()">🖼️ เลือกรูป</button>
